# NOTE: This secret is managed by Terraform (eks.tf kubernetes_secret resource).
# The real secret is created automatically with the correct MongoDB private IP.
# This file is a placeholder for documentation and local testing only.
#
# To create manually (replace MONGO_HOST and MONGO_PASSWORD):
#   kubectl create secret generic mongodb-secret \
#     --from-literal=MONGO_URI="mongodb://wiz:<MONGO_PASSWORD>@<MONGO_HOST>:27017/tododb" \
#     --namespace=wiz-app
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: wiz-app
type: Opaque
stringData:
  MONGO_URI: "mongodb://wiz:CHANGE_ME@MONGO_HOST:27017/tododb"
